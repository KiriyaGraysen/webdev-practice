<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Sandbox v4</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center">
        
        <h1 class="text-2xl font-bold text-gray-800 mb-4">
            System Dashboard
        </h1>
        
        <p class="text-gray-600 mb-6 hidden md:block">
            This paragraph is completely hidden on mobile phones, but appears on tablets and desktop screens!
        </p>
        
        <button class="bg-blue-500 text-white font-semibold py-2 px-4 rounded hover:bg-blue-600 hover:scale-105 transition-transform duration-200">
            Click Me
        </button>

    </div>

</body>
</html>
