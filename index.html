<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Practice</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-white shadow-md w-full fixed top-0 left-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            
            <div class="text-xl font-bold text-blue-600 tracking-wide">
                Sys<span class="text-gray-800">Admin</span>
                
            </div>
            
            <div class="hidden md:flex space-x-8 text-sm font-medium text-gray-600">
                <a href="#" class="hover:text-blue-500 transition-colors">Dashboard</a>
                <a href="#" class="hover:text-blue-500 transition-colors">Inventory</a>
                <a href="#" class="hover:text-blue-500 transition-colors">Reports</a>
            </div>
            
            <div>
                <button class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-colors text-sm font-semibold">
                    Logout
                </button>
                
                <button id="mobile-btn" class="md:hidden text-2xl focus:outline-none">
                    ☰
                </button>
            </div>
            
        </div>
    </nav>
    
    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden absolute top-15 left-0 w-full bg-white shadow-md border-t border-gray-200 flex-col py-4 px-6 space-y-4 z-40">
        <a href="#" class="text-gray-600 hover:text-blue-500 font-medium">Dashboard</a>
        <a href="#" class="text-gray-600 hover:text-blue-500 font-medium">Inventory</a>
        <a href="#" class="text-gray-600 hover:text-blue-500 font-medium">Reports</a>
    </div>

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center mx-auto mt-20">
        
        <div class="w-24 h-24 bg-gray-300 border-blue-500 rounded-full border-4 mx-auto mb-4">
            
        </div>
        
        <h1 class="text-2xl font-bold text-gray-800 mb-4">
            System Dashboard
        </h1>
        
        <p class="text-gray-600 mb-6 hidden md:block">
            This paragraph is completely hidden on mobile phones, but appears on tablets and desktop screens!
        </p>
        
        <button class="bg-gradient-to-r from-purple-500 to-blue-500 text-white font-semibold py-2 px-4 rounded hover:from-purple-600 hover:to-blue-600 focus:ring focus:outline-none focus:ring-offset-2 focus:ring-purple-400 transition-transform duration-200">
            Click Me
        </button>

    </div>
    
    <div class="bg-white p-8 block rounded-lg shadow-md w-full max-w-sm mx-auto mt-4 mb-4">
        <h2 class="text-xl font-bold text-gray-800 mb-4">Add Inventory Item</h2>
        
        <form id="inventory-form" class="space-y-4" action="POST">
            <div>
                <label class="block text-sm font-medium text-gray-700">Item Name</label>
                <input type="text" id="item-name" class="mt-1 block w-full  border border-gray-300 rounded-md p-2 foucs::ring-2 focus:ring-blue-400 focus:outline-none" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Quantity</label>
                <input type="number" id="item-qty" class="mt-1 block w-full border border-gray-300 rounded-md p-2 foucs:ring-2 focus: ring-blue-400 focus:outline-none" required>
            </div>
            
            <button type="submit" class="w-full bg-gray-800 text-white font-semibold py-2 rounded-md hover:bg-gray-900 transition-colors">Save to Database</button>
        </form>
        
        <p id="success-msg" class="mt-4 text-green-600 text-sm font-medium hidden"></p>
    </div>
    
    <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-3xl mx-auto mt-8 overflow-x-auto">
        <h3 class="text-lg font-bold text-gray-800 mb-4">Live Database Records</h3>
        
        <table class="min-w-full text-left text-sm text-gray-600">
            <thead class="bg-gray-50 border-b border-gray-200">
                <tr>
                    <th class="px-4 py-3 font-semibold text-gray-700 text-center">ID</th>
                    <th class="px-4 py-3 font-semibold text-gray-700 text-center">Item Name</th>
                    <th class="px-4 py-3 font-semibold text-gray-700 text-center">Quantity</th>
                    <th>Action</th>
                </tr>
            </thead>
            
            <tbody id="table-body" class="divide-y divide-gray-200"></tbody>
        </table>
    </div>
    
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-4">
        <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-sm">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Edit Inventory Item</h2>
            
            <form id="edit-form" class="space-y-4">
                <input type="hidden" id="edit-id"> 
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Item Name</label>
                    <input type="text" id="edit-name" class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-400 focus:outline-none" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Quantity</label>
                    <input type="number" id="edit-qty" class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-400 focus:outline-none" required>
                </div>
                
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" id="close-modal-btn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300 font-medium">Cancel</button>
                    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 font-medium">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // 1. Select the elements from the DOM
        const btn = document.getElementById('mobile-btn');
        const menu = document.getElementById('mobile-menu');
        
        const form = document.getElementById('inventory-form');
        const nameInput = document.getElementById('item-name');
        const qtyInput = document.getElementById('item-qty');
        const successMsg = document.getElementById('success-msg');
        const tableBody = document.getElementById('table-body');
        
        const editModal = document.getElementById('edit-modal');
        const editForm = document.getElementById('edit-form');
        const editIdInput = document.getElementById('edit-id');
        const editNameInput = document.getElementById('edit-name');
        const editQtyInput = document.getElementById('edit-qty');
        const closeModalBtn = document.getElementById('close-modal-btn');
        
        // 2. Listen for a click event on the button
        btn.addEventListener('click', () => {
            // 3. React: Toggle the Tailwind 'hidden' class on and off
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
        });
        
        form.addEventListener('submit', (event) => {
            event.preventDefault();
           
            const dataPackage = new FormData();
           
            dataPackage.append('itemName', nameInput.value);
           
            dataPackage.append('itemQty', qtyInput.value);
           
            fetch('save_item.php', {
                method: 'POST',
                body: dataPackage
            })
            .then(response => response.text())
            .then(data => {
                successMsg.textContent = data;
                successMsg.classList.remove('hidden');
                
                loadTableData();
                form.reset();
            });
        });
        
        function loadTableData() {
            fetch('get_item.php')
            .then(response => response.json())
            .then(data => {
                tableBody.innerHTML = '';
                
                data.forEach(row => {
                    tableBody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition-colors text-center">
                            <td class="px-4 py-3">${row.id}</td>
                            <td class="px-4 py-3 font-medium text-gray-800">${row.item_name}</td>
                            <td class="px-4 py-3">
                                <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded-full text-xs font-bold">
                                    ${row.quantity}
                                </span>
                            </td>
                            <td class="px-4 py-3">
                                <button onclick="openEditModal(${row.id}, '${row.item_name}', ${row.quantity})" class="text-blue-500 hover:text-blue-700 font-semibold text-sm">
                                    Edit
                                </button>
                                <button onclick="deleteItem(${row.id})" class="text-red-500 hover:text-red-700 font-semibold text-sm">
                                    Delete
                                </button>
                            </td>
                        </tr>
                    `;
                });
            });
        }
        
        function openEditModal(id, name, qty) {
            editIdInput.value = id;
            editNameInput.value = name;
            editQtyInput.value = qty;
            
            editModal.classList.remove('hidden');
        }
        
        closeModalBtn.addEventListener('click', () => {
            editModal.classList.add('hidden');
        });
        
        editForm.addEventListener('submit', (event) => {
            event.preventDefault();
           
            const updateData = new FormData();
            updateData.append('id', editIdInput.value);
            updateData.append('itemName', editNameInput.value);
            updateData.append('itemQty', editQtyInput.value);
            
            fetch('update_item.php', {
                method: 'POST',
                body: updateData
            })
            .then(response => response.text())
            .then(data => {
                editModal.classList.add('hidden');
                loadTableData();
                alert(data);
            });
        });
        
        function deleteItem(id) {
            const isConfirmed = confirm("Are you sure you want to permanently delete this item?");
            
            if (!isConfirmed) {
                return;
            }
            
            const deleteData = new FormData();
            deleteData.append('id', id);
            
            fetch('delete_item.php', {
                method: 'POST',
                body: deleteData
            })
            .then(response => response.text())
            .then(data => {
                alert(data);
                loadTableData();
            });
        }
        
        loadTableData();
    </script>
</body>
</html>
