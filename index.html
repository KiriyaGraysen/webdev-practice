<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Sandbox v4</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <nav class="bg-white shadow-md w-full fixed top-0 left-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            
            <div class="text-xl font-bold text-blue-600 tracking-wide">
                Sys<span class="text-gray-800">Admin</span>
                
            </div>
            
            <div class="hidden md:flex space-x-8 text-sm font-medium text-gray-600">
                <a href="#" class="hover:text-blue-500 transition-colors">Dashboard</a>
                <a href="#" class="hover:text-blue-500 transition-colors">Inventory</a>
                <a href="#" class="hover:text-blue-500 transition-colors">Reports</a>
            </div>
            
            <div>
                <button class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-colors text-sm font-semibold">
                    Logout
                </button>
            </div>
            
        </div>
    </nav>

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center">
        
        <div class="w-24 h-24 bg-gray-300 border-blue-500 rounded-full border-4 mx-auto mb-4">
            
        </div>
        
        <h1 class="text-2xl font-bold text-gray-800 mb-4">
            System Dashboard
        </h1>
        
        <p class="text-gray-600 mb-6 hidden md:block">
            This paragraph is completely hidden on mobile phones, but appears on tablets and desktop screens!
        </p>
        
        <button class="bg-gradient-to-r from-purple-500 to-blue-500 text-white font-semibold py-2 px-4 rounded hover:from-purple-600 hover:to-blue-600 focus:ring focus:outline-none focus:ring-offset-2 focus:ring-purple-400 transition-transform duration-200">
            Click Me
        </button>

    </div>

</body>
</html>
